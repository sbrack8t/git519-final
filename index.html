<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="js/script.js" defer></script>
    <title>Document</title>
  </head>
  <>
    <nav id="main-nav">
      <div class="nav-inner">
        <a href="#hero" class="nav-logo">Studio Brooklyn</a>
        <ul class="nav-links">
          <li><a href="#hero">Home</a></li>
          <li><a href="#about">About</a></li>
          <li><a href="#gallery">Gallery</a></li>
          <li><a href="#contact">Contact</a></li>
        </ul>
        <button class="mode-toggle" aria-label="Toggle Dark Mode"></button>
      </div>
    </nav>

    <section id="hero" class="hero-block">
      <div class="hero-content">
        <p class="hero-eyebrow">Eyebrow</p>
        <h1 class="hero-headline">
          Hero headline.<br />Modern Design Inspiration
        </h1>
        <p class="hero-subtext">Subtext</p>
        <div class="hero-actions">
          <a href="#gallery" class="button button-primary">Gallery Link</a>
        </div>
      </div>
    </section>

    

    <section id="about">
      <div class="section-inner about-layout">
        <div class="about-text">
          <p class="section-label">About</p>
          <h2 class="section-heading">About section text</h2>
        </div>
      </div>

      <section id="gallery">
        <div class="section-inner">
          <p class="section-label">The collection</p>
          <h2 class="section-heading">Shop the latest pieces</h2>
        </div>
        <!-- Product Card Start -->
        <div class="product-grid">
          <div class="product-card">
            <div class="product-image-wrap">
              <img src="#" alt="Minimal ceramic bowl" class="product-image" />
            </div>
            <div class="product-details">
              <h3 class="product-title">Title</h3>
              <p class="product-description">description</p>
              <div class="product-footer">
                <span class="product-cost">$999.00</span>
                <button class="button button-cart" type="button">
                  Add to cart
                </button>
              </div>
            </div>
          </div>
          <!-- Product Card Start -->
        </div>
      </section>
    </section>

    <section>
      <form id="contact-form" class="contact-form">
        <div class="form-row">
          <div class="form-field">
            <label for="contact-first-name">First name</label>
            <input
              type="text"
              id="contact-first-name"
              name="first-name"
              placeholder="Jane"
              required
            />
            <div class="form-error" hidden aria-hidden="true"></div>
          </div>

          <div class="form-field">
            <label for="contact-last-name">Last name</label>
            <input
              type="text"
              id="contact-last-name"
              name="last-name"
              placeholder="Smith"
              required
            />
            <div class="form-error" hidden aria-hidden="true"></div>
          </div>
        </div>

        <div class="form-field">
          <label for="contact-email">Email address</label>
          <input
            type="email"
            id="contact-email"
            name="email"
            placeholder="jane@example.com"
            required
          />
          <div class="form-error" hidden aria-hidden="true"></div>
        </div>

        <div class="form-field">
          <label for="contact-phone">Phone number</label>
          <input
            type="phone"
            id="contact-phone"
            name="phone"
            placeholder="123-111-1234"
            required
          />
          <div class="form-error" hidden aria-hidden="true"></div>
        </div>

        <fieldset class="form-fieldset" id="contact-method-preference">
          <legend class="form-legend">Select preferred contact method</legend>
          <div class="form-field">
            <input
              type="radio"
              id="contact-method-phone"
              value="phone"
              name="preference"
              checked
            />
            <label for="contact-method-phone">Phone</label>
          </div>
          <div class="form-field">
            <input type="radio" id="contact-method-email" value="email" name="preference"/>
            <label for="contact-method-email">Email</label>
          </div>
        </fieldset>

        <div class="form-field">
          <label for="contact-comments">Comments</label>
          <textarea
            id="contact-comments"
            name="comments"
            rows="5"
            placeholder="Please enter your comments"
            required
          ></textarea>
          <div class="form-error" hidden aria-hidden="true"></div>
        </div>
        <button
          id="contact-form-submit"
          type="submit"
          class="button button-primary"
        >
          Send
        </button>
      </form>
      <div id="form-message">

      </div>
    </section>
  </body>
</html>
