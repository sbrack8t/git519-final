<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <nav id="main-nav">
      <div class="nav-inner">
        <a href="#hero" class="nav-logo">Studio&nbsp;Grayscale</a>
        <button
          class="nav-toggle"
          aria-label="Toggle menu"
          aria-expanded="false"
        >
          <span></span><span></span><span></span>
        </button>
        <ul class="nav-links">
          <li><a href="#hero">Home</a></li>
          <li><a href="#about">About</a></li>
          <li><a href="#gallery">Gallery</a></li>
          <li><a href="#contact">Contact</a></li>
        </ul>
      </div>
    </nav>

    <section id="hero" class="hero-block">
      <div class="hero-content">
        <p class="hero-eyebrow">Eyebrow</p>
        <h1 class="hero-headline">Hero headline.<br />Built to last.</h1>
        <p class="hero-subtext">Subtext</p>
        <div class="hero-actions">
          <a href="#gallery" class="button button-primary">Gallery Link</a>
        </div>
      </div>
    </section>

    <section id="about">
      <div class="section-inner about-layout">
        <div class="about-text">
          <p class="section-label">About</p>
          <h2 class="section-heading">About section text</h2>
        </div>
      </div>

      <section id="gallery">
        <div class="section-inner">
          <p class="section-label">Our collection</p>
          <h2 class="section-heading">Shop the latest pieces</h2>
        </div>
        <!-- Product Card Start -->
        <div class="product-grid">
          <div class="product-card">
            <div class="product-image-wrap">
              <img src="#" alt="Minimal ceramic bowl" class="product-image" />
            </div>
            <div class="product-details">
              <h3 class="product-title">Title</h3>
              <p class="product-description">description</p>
              <div class="product-footer">
                <span class="product-cost">$999.00</span>
                <button class="button button-cart" type="button">
                  Add to cart
                </button>
              </div>
            </div>
          </div>
          <!-- Product Card Start -->
        </div>
      </section>
    </section>
  </body>
</html>
